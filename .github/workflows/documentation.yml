name: Documentation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  check-docs:
    name: Check documentation and examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          config-file: '.github/markdown-link-check-config.json'
          folder-path: '.'
          file-extension: '.md'
      - name: Build documented examples as C++17
        run: |
          cmake -S . -B build -DTHREADSCHEDULE_BUILD_EXAMPLES=ON -DTHREADSCHEDULE_BUILD_DOCS=OFF -DCMAKE_CXX_STANDARD=17
          cmake --build build --parallel
      - name: Validate release documentation
        run: |
          test -f docs/API.md
          test -f docs/ADVANCED.md
          test -f docs/COMPATIBILITY.md
          test -f docs/CMAKE_REFERENCE.md
          test -f docs/MIGRATION_V3.md
          grep -q '#include <threadschedule/threadschedule.hpp>' README.md

  deploy-docs:
    name: Build and deploy Doxygen
    if: github.ref == 'refs/heads/main'
    needs: check-docs
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y doxygen graphviz
      - run: cmake -S . -B build -DTHREADSCHEDULE_BUILD_DOCS=ON
      - run: cmake --build build --target docs --parallel
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/docs/doxygen/html
      - uses: actions/deploy-pages@v4
