name: Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  linux:
    name: Linux GCC ${{ matrix.gcc }} / C++${{ matrix.standard }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-22.04, gcc: 11, standard: 17 }
          - { runner: ubuntu-22.04, gcc: 11, standard: 20 }
          - { runner: ubuntu-22.04, gcc: 11, standard: 23 }
          - { runner: ubuntu-24.04, gcc: 13, standard: 17 }
          - { runner: ubuntu-24.04, gcc: 13, standard: 20 }
          - { runner: ubuntu-24.04, gcc: 13, standard: 23 }
          - { runner: ubuntu-24.04, gcc: 14, standard: 17 }
          - { runner: ubuntu-24.04, gcc: 14, standard: 20 }
          - { runner: ubuntu-24.04, gcc: 14, standard: 23 }
          - { runner: ubuntu-24.04, gcc: 14, standard: 26 }
          - { runner: ubuntu-24.04, gcc: 15, standard: 17 }
          - { runner: ubuntu-24.04, gcc: 15, standard: 20 }
          - { runner: ubuntu-24.04, gcc: 15, standard: 23 }
          - { runner: ubuntu-24.04, gcc: 15, standard: 26 }
          - { runner: ubuntu-24.04, gcc: 16, standard: 17 }
          - { runner: ubuntu-24.04, gcc: 16, standard: 20 }
          - { runner: ubuntu-24.04, gcc: 16, standard: 23 }
          - { runner: ubuntu-24.04, gcc: 16, standard: 26 }
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: |
          if [ "${{ matrix.gcc }}" -ge 15 ]; then
            sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          fi
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++-${{ matrix.gcc }}
      - name: Record toolchain
        run: |
          g++-${{ matrix.gcc }} --version
          g++-${{ matrix.gcc }} -print-file-name=libstdc++.so
      - name: Configure
        env:
          CC: gcc-${{ matrix.gcc }}
          CXX: g++-${{ matrix.gcc }}
        run: >-
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_CXX_STANDARD=${{ matrix.standard }}
          -DTHREADSCHEDULE_BUILD_EXAMPLES=ON
          -DTHREADSCHEDULE_BUILD_TESTS=ON
          -DTHREADSCHEDULE_BUILD_DOCS=OFF
      - run: cmake --build build --parallel
      - run: ctest --test-dir build --output-on-failure --parallel 2

  linux-arm64:
    name: Linux ARM64 GCC ${{ matrix.gcc }} / C++${{ matrix.standard }}
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        include:
          - { gcc: 13, standard: 17 }
          - { gcc: 13, standard: 20 }
          - { gcc: 13, standard: 23 }
          - { gcc: 14, standard: 26 }
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y cmake ninja-build g++-${{ matrix.gcc }}
      - run: g++-${{ matrix.gcc }} --version
      - name: Configure
        env:
          CC: gcc-${{ matrix.gcc }}
          CXX: g++-${{ matrix.gcc }}
        run: >-
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_CXX_STANDARD=${{ matrix.standard }}
          -DTHREADSCHEDULE_BUILD_EXAMPLES=ON
          -DTHREADSCHEDULE_BUILD_TESTS=ON
          -DTHREADSCHEDULE_BUILD_DOCS=OFF
      - run: cmake --build build --parallel
      - run: ctest --test-dir build --output-on-failure --parallel 2

  windows:
    name: Windows ${{ matrix.compiler }} / C++${{ matrix.standard }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [windows-2022, windows-2025]
        compiler: [msvc, mingw]
        standard: [17, 20, 23]
    steps:
      - uses: actions/checkout@v4
      - name: Enable MSVC
        if: matrix.compiler == 'msvc'
        uses: ilammy/msvc-dev-cmd@v1
      - name: Enable MinGW
        if: matrix.compiler == 'mingw'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc mingw-w64-x86_64-cmake mingw-w64-x86_64-ninja
      - name: Record MSVC version
        if: matrix.compiler == 'msvc'
        shell: pwsh
        run: cl 2>&1 | Select-Object -First 1
      - name: Record MinGW version
        if: matrix.compiler == 'mingw'
        shell: msys2 {0}
        run: g++ --version
      - name: Configure MSVC
        if: matrix.compiler == 'msvc'
        run: >-
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_CXX_STANDARD=${{ matrix.standard }}
          -DTHREADSCHEDULE_BUILD_EXAMPLES=ON
          -DTHREADSCHEDULE_BUILD_TESTS=ON
          -DTHREADSCHEDULE_BUILD_DOCS=OFF
          -Dgtest_force_shared_crt=ON
      - name: Configure MinGW
        if: matrix.compiler == 'mingw'
        shell: msys2 {0}
        run: >-
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_CXX_STANDARD=${{ matrix.standard }}
          -DTHREADSCHEDULE_BUILD_EXAMPLES=ON
          -DTHREADSCHEDULE_BUILD_TESTS=ON
          -DTHREADSCHEDULE_BUILD_DOCS=OFF
      - name: Build MSVC
        if: matrix.compiler == 'msvc'
        run: cmake --build build --parallel
      - name: Test MSVC
        if: matrix.compiler == 'msvc'
        run: ctest --test-dir build --output-on-failure -C Release
      - name: Build MinGW
        if: matrix.compiler == 'mingw'
        shell: msys2 {0}
        run: cmake --build build --parallel
      - name: Test MinGW
        if: matrix.compiler == 'mingw'
        shell: msys2 {0}
        run: ctest --test-dir build --output-on-failure
